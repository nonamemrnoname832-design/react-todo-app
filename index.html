<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Todo App</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 32px;
      width: 100%;
      max-width: 500px;
      height: fit-content;
    }
    h1 { text-align: center; color: #333; margin-bottom: 24px; font-size: 2rem; }
    .add-form { display: flex; gap: 8px; margin-bottom: 16px; }
    .todo-input {
      flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 1rem; transition: border-color 0.2s;
    }
    .todo-input:focus { outline: none; border-color: #667eea; }
    .add-btn {
      padding: 12px 24px; background: #667eea; color: white;
      border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; transition: background 0.2s;
    }
    .add-btn:hover { background: #5a6fd6; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button {
      flex: 1; padding: 8px; border: 2px solid #e0e0e0;
      background: white; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .filters button.active { border-color: #667eea; background: #667eea; color: white; }
    .todo-list { list-style: none; }
    .todo-list li {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #f8f9fa; border-radius: 8px;
      margin-bottom: 8px; transition: all 0.2s;
    }
    .todo-list li:hover { background: #e9ecef; }
    .todo-text { cursor: pointer; flex: 1; margin-right: 12px; }
    .todo-list li.completed .todo-text { text-decoration: line-through; color: #999; }
    .delete-btn {
      padding: 6px 12px; background: #ff4757; color: white;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 0.85rem; transition: background 0.2s;
    }
    .delete-btn:hover { background: #e8384f; }
    .stats { text-align: center; color: #666; margin-top: 16px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('all');

      const addTodo = (e) => {
        e.preventDefault();
        if (!input.trim()) return;
        setTodos([...todos, { id: Date.now(), text: input.trim(), completed: false }]);
        setInput('');
      };

      const toggleTodo = (id) => {
        setTodos(todos.map(todo =>
          todo.id === id ? { ...todo, completed: !todo.completed } : todo
        ));
      };

      const deleteTodo = (id) => {
        setTodos(todos.filter(todo => todo.id !== id));
      };

      const filteredTodos = todos.filter(todo => {
        if (filter === 'active') return !todo.completed;
        if (filter === 'completed') return todo.completed;
        return true;
      });

      const completedCount = todos.filter(t => t.completed).length;

      return (
        <div className="app">
          <h1>Todo App</h1>
          <form onSubmit={addTodo} className="add-form">
            <input
              type="text"
              value={input}
              onChange={(e) => setInput(e.target.value)}
              placeholder="What needs to be done?"
              className="todo-input"
            />
            <button type="submit" className="add-btn">Add</button>
          </form>
          <div className="filters">
            <button className={filter === 'all' ? 'active' : ''} onClick={() => setFilter('all')}>All</button>
            <button className={filter === 'active' ? 'active' : ''} onClick={() => setFilter('active')}>Active</button>
            <button className={filter === 'completed' ? 'active' : ''} onClick={() => setFilter('completed')}>Completed</button>
          </div>
          <ul className="todo-list">
            {filteredTodos.map(todo => (
              <li key={todo.id} className={todo.completed ? 'completed' : ''}>
                <span onClick={() => toggleTodo(todo.id)} className="todo-text">{todo.text}</span>
                <button onClick={() => deleteTodo(todo.id)} className="delete-btn">Delete</button>
              </li>
            ))}
          </ul>
          {todos.length > 0 && (
            <div className="stats">{completedCount} of {todos.length} completed</div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
